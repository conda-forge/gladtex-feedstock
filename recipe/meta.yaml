{% set name = "GladTeX" %}
{% set version = "3.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/GladTeX-{{ version }}.tar.gz
  sha256: 0d19f200f4ad836aa997e94d4cce58e0e94bb2a77b460fa47f5cde2b07175acb

build:
  number: 1
  noarch: python
  entry_points:
    - gladtex = gleetex.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - gleetex
  commands:
    - pip check
    - gladtex --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://humenda.github.io/GladTeX
  summary: Formula typesetting for the web using LaTeX
  license: AGPL-1.0-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - ickc
